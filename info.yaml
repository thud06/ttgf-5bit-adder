# Tiny Tapeout project information
project:
  title:        "5-bit Combinational Adder"
  author:       "James Hill"
  discord:      ""      # Optional
  description:  "A purely combinational 5-bit adder with carry-in, carry-out, signed overflow, and zero flag."
  language:     "Verilog"
  clock_hz:     0       # No clock used; purely combinational

  # How many tiles your design occupies? A single tile is about 340x160 uM.
  tiles: "1x1"

  # Your top module name must start with "tt_um_".
  top_module:  "tt_um_james_5bit_comb_adder"

  # List your project's source files here.
  # Source files must be in ./src and listed one per line.
  # Don't forget to also update PROJECT_SOURCES in test/Makefile.
  source_files:
    - "project.v"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names.
pinout:
  # Inputs
  ui[0]: "A0"
  ui[1]: "A1"
  ui[2]: "A2"
  ui[3]: "A3"
  ui[4]: "A4"
  ui[5]: "CIN"
  ui[6]: ""
  ui[7]: ""

  # Outputs
  uo[0]: "SUM0"
  uo[1]: "SUM1"
  uo[2]: "SUM2"
  uo[3]: "SUM3"
  uo[4]: "SUM4"
  uo[5]: "COUT"
  uo[6]: "OVF"
  uo[7]: "ZERO"

  # Bidirectional pins
  uio[0]: "B0"
  uio[1]: "B1"
  uio[2]: "B2"
  uio[3]: "B3"
  uio[4]: "B4"
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""

# Do not change!
yaml_version: 6
